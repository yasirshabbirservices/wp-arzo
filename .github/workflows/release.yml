name: Release plugin

# On every pushed version tag (vX.Y.Z): build a clean plugin zip and publish/refresh
# the matching GitHub Release with that zip attached. The in-plugin updater
# (includes/class-wp-arzo-updater.php) reads the latest release + this asset to offer
# one-click / auto updates inside wp-admin.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building wp-arzo $VERSION"
          mkdir -p build/wp-arzo
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='CLAUDE.md' \
            --exclude='AI_RULES.md' \
            --exclude='node_modules' \
            --exclude='build' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            ./ build/wp-arzo/
          (cd build && zip -rq wp-arzo.zip wp-arzo)
          ls -la build

      - name: Extract changelog for this version
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { f = 1; print; next }
            /^## \[/ { if (f) exit }
            f { print }
          ' CHANGELOG.md > release-notes.md || true
          if [ ! -s release-notes.md ]; then
            echo "WP Arzo ${GITHUB_REF_NAME}" > release-notes.md
          fi
          echo "----- release notes -----"; cat release-notes.md

      - name: Publish release + asset
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: build/wp-arzo.zip
          make_latest: true
